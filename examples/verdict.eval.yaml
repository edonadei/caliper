skill:
  path: ./SKILL.md
  backend: claude
  model: claude-sonnet-4-6

judge:
  backend: claude
  model: claude-haiku-4-5-20251001

sandbox:
  forbidden_files:
    - ".*\\.eval\\.yaml$"
    - "./.verdict/.*"

tasks:
  - id: task-001
    name: Validates a correct spec and reports it as valid
    setup: |
      cat > /tmp/verdict-test-valid.eval.yaml << 'EOF'
      skill:
        path: ~/.claude/commands/review.md
        backend: claude
      tasks:
        - id: t1
          name: Test task
          prompt: /review the diff
          expect: The review identifies at least one issue
      EOF
    cleanup: rm -f /tmp/verdict-test-valid.eval.yaml
    prompt: >
      Use verdict to validate the spec file at /tmp/verdict-test-valid.eval.yaml
      and tell me whether it is valid.
    expect: The agent runs verdict validate and reports the spec is valid with no errors
    assert: |
      import subprocess, sys
      result = subprocess.run(
          ["verdict", "validate", "/tmp/verdict-test-valid.eval.yaml"],
          capture_output=True, text=True
      )
      assert result.returncode == 0, f"verdict validate exited {result.returncode}: {result.stderr}"

  - id: task-002
    name: Identifies errors in an invalid spec
    setup: |
      cat > /tmp/verdict-test-invalid.eval.yaml << 'EOF'
      skill:
        backend: claude
      tasks:
        - id: t1
          name: Broken task
          prompt: do something
      EOF
    cleanup: rm -f /tmp/verdict-test-invalid.eval.yaml
    prompt: >
      Use verdict to validate the spec file at /tmp/verdict-test-invalid.eval.yaml
      and tell me what errors it contains.
    expect: >
      The agent runs verdict validate and reports that the spec is invalid,
      describing that the task is missing both expect and assert fields

  - id: task-003
    name: Creates a valid eval spec file on request
    cleanup: rm -f /tmp/verdict-created.eval.yaml
    prompt: >
      Create an evaluation spec file at /tmp/verdict-created.eval.yaml for a skill
      that reviews code. Include one task: id task-001, name "Reviews a PR", prompt
      "/review the diff in /tmp/repo", and expectation "The review identifies at least
      one issue". Use claude as the backend.
    expect: A valid .eval.yaml file is written at /tmp/verdict-created.eval.yaml
    assert: |
      import os, yaml
      path = "/tmp/verdict-created.eval.yaml"
      assert os.path.exists(path), "Spec file was not created"
      with open(path) as f:
          spec = yaml.safe_load(f)
      assert "skill" in spec, "Missing 'skill' section"
      assert "tasks" in spec, "Missing 'tasks' section"
      assert len(spec["tasks"]) >= 1, "No tasks defined"
      task = spec["tasks"][0]
      assert "prompt" in task, "Task missing 'prompt'"
      assert "expect" in task or "assert" in task, "Task missing both 'expect' and 'assert'"

  - id: task-004
    name: Lists available evaluations gracefully
    prompt: >
      Use verdict to list all available evaluations and tell me what you find.
    expect: >
      The agent runs verdict list and either shows a table of available evaluations
      with scores and timestamps, or clearly states that no results have been recorded yet
