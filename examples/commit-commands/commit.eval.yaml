# ─────────────────────────────────────────────────────────────────────────────
# EVALUATING A REAL, POPULAR SKILL: commit-commands `/commit`
#
# This evaluates the official `commit-commands` skill (the `/commit` command,
# ~14k installs) — vendored here as `commit.md` — on two everyday commit tasks.
# Each task sets up a throwaway git repo under /tmp with a staged change and asks
# the agent to commit it; the checks confirm exactly one clean commit was made.
#
#   caliper run commit.eval.yaml --k 3
#
# To also measure the skill against the bare agent (the token/wall cost of the
# skill's git-context injection is the interesting part), add --baseline. Because
# both tasks use fixed /tmp repos, run the baseline serially so the with-skill and
# no-skill runs don't share a repo:
#
#   caliper run commit.eval.yaml --k 3 --baseline --workers 1
# ─────────────────────────────────────────────────────────────────────────────

skill:
  # The vendored commit-commands `/commit` skill (MIT — see README.md).
  path: ./commit.md
  # The engine (backend + model) is a runtime axis, not a spec field — pick it
  # when you run, e.g. `--model claude-code:claude-haiku-4-5-20251001`.

tasks:
  - name: Commits a new feature
    setup: |
      rm -rf /tmp/caliper-commit-feat
      mkdir -p /tmp/caliper-commit-feat && cd /tmp/caliper-commit-feat
      git init -q && git config user.email eval@caliper.test && git config user.name Caliper
      printf 'def add(a, b):\n    return a + b\n' > calc.py
      git add calc.py && git commit -qm "chore: initial calc module"
      printf '\ndef multiply(a, b):\n    return a * b\n' >> calc.py
      git add calc.py
    cleanup: rm -rf /tmp/caliper-commit-feat
    prompt: "The git repository at /tmp/caliper-commit-feat has a staged change. Create a single git commit for it."
    expect: >
      The agent created exactly one git commit whose message concisely and
      accurately describes adding a multiply function. It did not ask clarifying
      questions or add unrelated commentary.
    assert: |
      import subprocess
      repo = "/tmp/caliper-commit-feat"
      n = subprocess.run(
          ["git", "-C", repo, "rev-list", "--count", "HEAD"],
          capture_output=True, text=True,
      ).stdout.strip()
      assert n == "2", f"expected exactly 2 commits (1 new), got {n}"
      msg = subprocess.run(
          ["git", "-C", repo, "log", "-1", "--pretty=%B"],
          capture_output=True, text=True,
      ).stdout
      assert msg.strip(), "empty commit message"

  - name: Commits a bug fix
    setup: |
      rm -rf /tmp/caliper-commit-fix
      mkdir -p /tmp/caliper-commit-fix && cd /tmp/caliper-commit-fix
      git init -q && git config user.email eval@caliper.test && git config user.name Caliper
      printf 'def divide(a, b):\n    return a / b\n' > mathutil.py
      git add mathutil.py && git commit -qm "chore: initial mathutil"
      printf 'def divide(a, b):\n    if b == 0:\n        return None\n    return a / b\n' > mathutil.py
      git add mathutil.py
    cleanup: rm -rf /tmp/caliper-commit-fix
    prompt: "The git repository at /tmp/caliper-commit-fix has a staged change. Create a single git commit for it."
    expect: >
      The agent created exactly one git commit whose message concisely and
      accurately describes fixing the divide-by-zero bug. It did not ask
      clarifying questions or add unrelated commentary.
    assert: |
      import subprocess
      repo = "/tmp/caliper-commit-fix"
      n = subprocess.run(
          ["git", "-C", repo, "rev-list", "--count", "HEAD"],
          capture_output=True, text=True,
      ).stdout.strip()
      assert n == "2", f"expected exactly 2 commits (1 new), got {n}"
      msg = subprocess.run(
          ["git", "-C", repo, "log", "-1", "--pretty=%B"],
          capture_output=True, text=True,
      ).stdout
      assert msg.strip(), "empty commit message"
